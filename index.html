<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Prompt Pad</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
    :root {
        --ocean-light: #e0f7fa;
        --ocean-mid: #b2ebf2;
        --ocean-deep: #00838f;
        --ocean-text: #004d40;
        --glass-bg: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(255, 255, 255, 0.9);
        --accent: #00bcd4;
        --radius: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: linear-gradient(135deg, var(--ocean-light) 0%, #80deea 100%);
        color: var(--ocean-text);
        font-family: 'Pretendard', sans-serif;
        min-height: 100vh; padding: 20px 15px;
        display: flex; flex-direction: column; align-items: center;
    }

    .container { width: 100%; max-width: 600px; }

    /* Header & AI Selector */
    .top-section {
        background: var(--glass-bg);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        padding: 20px; margin-bottom: 25px;
        box-shadow: 0 8px 32px rgba(0, 131, 143, 0.08);
        display: flex; flex-direction: column; gap: 15px; align-items: center;
    }
    .logo { font-size: 22px; font-weight: 800; color: var(--ocean-deep); letter-spacing: -0.5px; }
    
    .ai-selector { display: flex; width: 100%; gap: 8px; background: rgba(255,255,255,0.6); padding: 6px; border-radius: 50px; }
    .ai-selector label {
        flex: 1; text-align: center; padding: 10px 0; border-radius: 50px; cursor: pointer;
        font-size: 14px; font-weight: 700; color: #555; transition: all 0.2s;
    }
    .ai-selector input[type="radio"] { display: none; }
    .ai-selector input[type="radio"]:checked + label {
        background: var(--ocean-deep); color: #fff; box-shadow: 0 4px 10px rgba(0, 131, 143, 0.3);
    }

    /* 2x2 Cards Grid */
    .cards-grid {
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 15px; 
        margin-bottom: 30px;
    }
    
    .card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius); overflow: hidden;
        box-shadow: 0 6px 20px rgba(0, 131, 143, 0.08);
        display: flex; flex-direction: column;
        cursor: pointer; position: relative;
        transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.9); }
    
    .card-body { padding: 30px 15px 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .card-icon { font-size: 28px; margin-bottom: 10px; }
    .card-title { font-weight: 800; font-size: 16px; color: var(--ocean-deep); margin-bottom: 6px; line-height: 1.2; word-break: keep-all; }
    .card-desc { font-size: 12px; color: #555; font-weight: 500; line-height: 1.4; word-break: keep-all; }
    
    /* 우상단 + 플로팅 버튼 */
    .btn-toggle {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.8);
        color: var(--ocean-deep);
        border: 1px solid rgba(0, 188, 212, 0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        z-index: 10;
        box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .btn-toggle:active { transform: scale(0.85); background: var(--ocean-light); }

    .card-content { display: none; padding: 0 15px 15px; border-top: 1px solid rgba(0,0,0,0.05); }
    .card-content.open { display: block; cursor: default; }
    .card-content pre {
        font-family: 'Pretendard', monospace; font-size: 11px; color: #444;
        white-space: pre-wrap; line-height: 1.6; padding-top: 12px; max-height: 250px; overflow-y: auto; text-align: left;
    }

    /* Toast */
    .toast {
        position: fixed; bottom: 40px; left: 50%; transform: translate(-50%, 20px);
        background: var(--ocean-deep); color: #fff; padding: 14px 28px;
        border-radius: 50px; font-weight: 700; font-size: 15px; width: max-content;
        opacity: 0; pointer-events: none; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 999;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.warn { background: #f57c00; }
</style>
</head>

const grid = document.getElementById('cardsGrid');
const toast = document.getElementById('toast');

// 카드 렌더링
PROMPTS.forEach((p) => {
    const card = document.createElement('div');
    card.className = 'card';
    
    // 우상단 + 버튼을 최상단에 배치
    card.innerHTML = `
        <button class="btn-toggle">+</button>
        <div class="card-body">
            <div class="card-icon">${p.icon}</div>
            <div class="card-title">${p.ui_title}</div>
            <div class="card-desc">${p.ui_desc}</div>
        </div>
        <div class="card-content">
            <pre>${p.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
        </div>
    `;

    const toggleBtn = card.querySelector('.btn-toggle');
    const contentEl = card.querySelector('.card-content');

    // 우상단 "+" 버튼 클릭 시 펼치기 (복사 방지)
    toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // 카드 전체 클릭 이벤트(복사/이동) 방지
        const isOpen = contentEl.classList.toggle('open');
        toggleBtn.textContent = isOpen ? '−' : '+'; // 열리면 마이너스 기호로 변경
    });

    // 프리뷰(내용보기) 영역 클릭 시 (복사 방지)
    contentEl.addEventListener('click', (e) => {
        e.stopPropagation();
    });

    // 카드 전체(버튼 제외) 클릭 시 복사 & AI 자동 이동
    card.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(p.content);
            showToast('✅ 복사 완료! AI로 이동합니다...');
            
            // 라디오 버튼으로 선택한 AI 앱 주소 가져오기
            const selectedEngine = document.querySelector('input[name="ai_engine"]:checked').value;
            const targetUrl = AI_URLS[selectedEngine];
            
            // 1초 후 앱/웹 자동 실행
            setTimeout(() => {
                window.open(targetUrl, '_blank');
            }, 1000);
            
        } catch (err) {
            showToast('클립보드 복사에 실패했습니다.', 'warn');
        }
    });

    grid.appendChild(card);
});

// 알림창 띄우기 함수
let toastTimer;
function showToast(msg, type = '') {
    toast.textContent = msg;
    toast.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2000);
}
</script>
