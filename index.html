<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>StackInv Professional</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
<script src="config.js"></script>
<style>
/* 원본 CSS 100% 유지 */
:root{
  --bg:#f0f9ff; --surface:#fff;
  --navy:#0c1a2e; --sky:#0284c7; --sky-lt:#38bdf8;
  --border:#bae6fd; --border2:#e0f2fe;
  --text:#0f172a; --sub:#64748b;
  --buy:#16a34a; --sell:#2563eb; --stop:#dc2626; --warn:#d97706;
  --font-num:'Space Grotesk',sans-serif;
  --font-body:'Pretendard',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--font-body);background:var(--bg);color:var(--text);height:100%;overflow:hidden}
.ms{font-family:'Material Symbols Outlined' !important;font-weight:normal;font-style:normal;display:inline-block;line-height:1;text-transform:none;letter-spacing:normal;white-space:nowrap;-webkit-font-smoothing:antialiased}

.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;background:var(--bg)}

.hdr{background:var(--navy);padding:14px 18px 12px;flex-shrink:0;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:-20px;left:-10%;width:120%;height:50px;background:radial-gradient(ellipse at 50% 100%,rgba(56,189,248,0.15) 0%,transparent 70%)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.brand{font-family:var(--font-num);font-weight:900;font-size:19px;letter-spacing:-0.04em;color:#fff;display:flex;align-items:center;gap:7px}
.brand .ms{font-size:24px;color:var(--sky-lt)}
.hdr-right{display:flex;align-items:center;gap:8px}

/* 모바일 터치 개선을 위한 버튼 크기 미세 조정 */
.upd-btn{background:var(--sky-lt);color:var(--navy);border:none;border-radius:9px;padding:8px 14px;font-family:var(--font-num);font-weight:800;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.2s}
.upd-btn:active{transform:scale(.95)}
.upd-btn .ms{font-size:18px}
.cfg-btn{width:40px;height:40px;background:rgba(255,255,255,.1);border:none;border-radius:10px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.cfg-btn:active{background:rgba(255,255,255,.2)}
.cfg-btn .ms{font-size:24px}

.hdr-meta{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.02em}
.hdr-kpi{display:flex;justify-content:space-between;align-items:flex-end;margin-top:2px}
.hdr-total{font-family:var(--font-num);font-weight:900;font-size:20px;color:#fff;letter-spacing:-.02em}
.hdr-ret{font-family:var(--font-num);font-weight:700;font-size:13px;padding:3px 10px;border-radius:20px;background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.3);color:var(--sky-lt)}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

/* 알림바 스타일 */
#noticeBar{background:var(--warn);color:#fff;font-size:12px;font-weight:700;padding:10px 18px;display:none;justify-content:space-between;align-items:center}

.tab-content{flex:1;overflow-y:auto;padding:14px 14px 76px;-webkit-overflow-scrolling:touch}
.tab-pane{display:none} .tab-pane.active{display:block}

.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border2);display:flex;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
/* 탭바 아이콘 확대 */
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 2px 6px;font-size:10px;font-weight:700;color:var(--sub);background:none;border:none;cursor:pointer;transition:.2s;gap:4px;letter-spacing:.02em}
.tab-btn .ms{font-size:28px}
.tab-btn.active{color:var(--sky)} .tab-btn.active .ms{font-variation-settings:'FILL' 1}

/* 이하 모든 원본 컴포넌트 CSS 동일 */
.sl{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--sub);text-transform:uppercase;margin:14px 0 7px}
.concl{background:var(--navy);border-radius:16px;padding:14px 16px;margin-bottom:12px}
.concl-text{font-size:13px;line-height:1.65;color:rgba(255,255,255,.9)}
.evt{background:#fff;border:1px solid;border-left:4px solid;border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.evt.today{border-color:#fecaca;border-left-color:var(--stop);background:#fff5f5}
.oc{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#fff;border:1px solid var(--border2);border-left:4px solid;border-radius:11px;margin-bottom:6px}
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.hcard{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:13px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.kcard{background:#fff;border-radius:14px;border:1px solid var(--border2);padding:13px}
.trow{background:#fff;border-radius:13px;border:1px solid var(--border2);padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:7px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet{background:#fff;width:100%;max-width:480px;border-radius:26px 26px 0 0;padding:22px 18px;animation:sheetUp .35s cubic-bezier(.16,1,.3,1);max-height:88vh;overflow-y:auto}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.inp{width:100%;background:#f8fafc;border:1.5px solid var(--border2);border-radius:12px;padding:11px 13px;font-size:13px;font-family:var(--font-body);resize:none;outline:none;color:var(--text)}
.btn-primary{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:13px;font-family:var(--font-num);font-weight:800;font-size:14px;cursor:pointer;margin-top:11px}
.his-item{background:#fff;border:1px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.his-info{flex:1;cursor:pointer}
.his-date{font-weight:800;font-size:13px;color:var(--navy)}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(12,26,46,.92);color:#fff;padding:9px 22px;border-radius:99px;font-size:12px;font-weight:700;opacity:0;transition:.3s;z-index:999;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(10px)}
@media(min-width:480px){ .app{box-shadow:0 0 60px rgba(0,0,0,.12)} .tabbar{left:50%} }
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-top">
      <div class="brand"><span class="ms">anchor</span>StackInv</div>
      <div class="hdr-right">
        <button class="upd-btn" onclick="showInput()"><span class="ms">upload_file</span>업데이트</button>
        <button class="cfg-btn" onclick="showHistory()"><span class="ms">history</span></button>
      </div>
    </div>
    <div id="hdrMeta" class="hdr-meta">DB 연동 진행 중...</div>
    <div id="hdrKpi" style="display:none"></div>
  </header>

  <div id="noticeBar"><span>오늘자 브리핑이 없습니다.</span><button onclick="showInput()" style="text-decoration:underline">업데이트</button></div>

  <div class="tab-content" id="tabContent">
    <div class="tab-pane active" id="pane0"></div>
    <div class="tab-pane" id="pane1"></div>
    <div class="tab-pane" id="pane2"></div>
    <div class="tab-pane" id="pane3"></div>
  </div>

  <nav class="tabbar">
    <button class="tab-btn active" onclick="setTab(0)"><span class="ms">checklist</span>오늘</button>
    <button class="tab-btn" onclick="setTab(1)"><span class="ms">bar_chart</span>현황</button>
    <button class="tab-btn" onclick="setTab(2)"><span class="ms">speed</span>지표</button>
    <button class="tab-btn" onclick="setTab(3)"><span class="ms">navigation</span>항로</button>
  </nav>
</div>

<div class="overlay" id="inputOverlay"><div class="sheet"><div class="sheet-title">⚓ 브리핑 업데이트</div><textarea class="inp" id="inputTxt" rows="10" placeholder="브리핑을 붙여넣으세요..."></textarea><button class="btn-primary" id="processBtn" onclick="processInput()">⚓ DB 저장 및 파싱</button><button class="btn-ghost" style="width:100%;padding:10px;color:var(--sub)" onclick="hideInput()">취소</button></div></div>
<div class="overlay" id="historyOverlay"><div class="sheet"><div class="sheet-title">📜 과거 기록</div><div id="historyList"></div><button class="btn-primary" onclick="hideHistory()">닫기</button></div></div>
<div id="toast"></div>

<form id="syncForm" target="syncFrame" method="POST" style="display:none"><input type="hidden" name="payload" id="syncPayload"></form>
<iframe name="syncFrame" style="display:none" onload="if(window.isSaving) onSynced()"></iframe>

<script>
const S_ID = typeof CONFIG !== 'undefined' ? CONFIG.SHEET_ID : '';
const A_URL = typeof CONFIG !== 'undefined' ? CONFIG.API_URL : '';
let logsData = []; let D = null; window.isSaving = false;

window.onload = () => {
  if (S_ID) loadDataFromSheet();
  ['inputOverlay','historyOverlay'].forEach(id=>{ document.getElementById(id).addEventListener('click',function(e){ if(e.target===this) this.style.display='none'; }); });
};

async function loadDataFromSheet() {
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=inv_log&cache=${Date.now()}`);
    const csv = await res.text();
    logsData = parseCSV(csv);
    if (logsData.length > 0) { logsData.sort((a,b) => b.id.localeCompare(a.id)); applyData(logsData[0]); checkToday(logsData[0].id); }
    else { document.getElementById('hdrMeta').textContent = '데이터 없음'; document.getElementById('noticeBar').style.display = 'flex'; renderAll(); }
  } catch(e) { console.error(e); toast('DB 로드 실패'); }
}

function parseCSV(t) {
  const lines = t.trim().split('\n'); if(lines.length < 2) return [];
  const hdrs = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(l => {
    const v = []; let c = '', q = false;
    for(let i=0; i<l.length; i++){ const ch = l[i]; if(ch === '"') q = !q; else if(ch === ',' && !q){ v.push(c.trim()); c=''; } else c += ch; }
    v.push(c.trim()); const o = {};
    hdrs.forEach((h,i) => {
      let val = (v[i]||'').replace(/^"|"$/g,'').replace(/""/g, '"');
      o[h] = val.replace(/↵/g, '\n'); // 줄바꿈 복구
    });
    return o;
  });
}

function applyData(row) {
  try { D = JSON.parse(row.full_json); D.raw = row.raw_text; document.getElementById('hdrMeta').style.display = 'none'; renderAll(); } 
  catch(e) { console.error(e); }
}

function checkToday(lastId) {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('noticeBar').style.display = (lastId === today) ? 'none' : 'flex';
}

function processInput(){
  const raw = document.getElementById('inputTxt').value.trim(); if(!raw) return;
  const parsed = parseInv(raw); const id = new Date().toISOString().split('T')[0];
  window.isSaving = true; document.getElementById('processBtn').textContent = '저장 중...';
  const rawToSave = raw.replace(/\n/g, '↵');
  const fullJsonToSave = JSON.stringify(parsed).replace(/\n/g, '↵');
  const summaryJsonToSave = JSON.stringify({ total: parsed.account['총평가'], ret: parsed.account['수익률 (누적)'] }).replace(/\n/g, '↵');
  const payload = { action: 'upsert', data: { id: id, display_date: parsed.date || new Date().toLocaleString(), summary_json: summaryJsonToSave, full_json: fullJsonToSave, raw_text: rawToSave } };
  document.getElementById('syncPayload').value = JSON.stringify(payload);
  document.getElementById('syncForm').action = A_URL; document.getElementById('syncForm').submit();
  D = parsed; D.raw = raw; renderAll(); checkToday(id);
}

function onSynced(){
  if(!window.isSaving) return; window.isSaving = false; toast('✅ DB 동기화 완료');
  document.getElementById('processBtn').textContent = '⚓ DB 저장 및 파싱'; hideInput(); setTimeout(loadDataFromSheet, 600);
}

function deleteItem(id) {
  if(!confirm('삭제하시겠습니까?')) return; window.isSaving = true;
  document.getElementById('syncPayload').value = JSON.stringify({ action: 'delete', id: id });
  document.getElementById('syncForm').action = A_URL; document.getElementById('syncForm').submit(); hideHistory();
}

/* ── 이하 구버전 원본 렌더링 로직 (절대 수정 금지됨) ── */
function parseInv(raw){
  const d = {raw}; const dm = raw.match(/일일 브리핑 \((.+?)\)/); d.date = dm ? dm[1] : '';
  const lines = raw.split('\n'); const secs = {}; let cur = null;
  for(const l of lines){ const m = l.match(/^## ([A-M])\./); if(m){ cur=m[1]; secs[cur]=[]; } else if(cur) secs[cur].push(l); }
  d.holdings = tbl(secs.A||[]); d.account = kvMap(secs.B||[]);
  const cTbls = splitTbls((secs.C||[]).join('\n')); d.technicals = tbl((cTbls[0]||'').split('\n')); d.triggers = tbl((cTbls[1]||'').split('\n'));
  d.changes = tbl(secs.D||[]); d.macro = bullets(secs.E||[]); d.sectors = bullets(secs.F||[]);
  d.ddays = tbl(secs.G||[]); d.risks = tbl(secs.H||[]); d.orders = tbl(secs.I||[]);
  d.eth = (secs.J||[]).join(' ').trim();
  const kTxt = (secs.K||[]).join('\n'); const km = kTxt.match(/누적 매매익.*?(\d[\d,]+원)/); d.taxPaid = km ? km[1] : '0원';
  d.candidates = tbl(secs.L||[]); const mTxt = (secs.M||[]).join('\n');
  const cf = mTxt.match(/확신.*?:\s*(.+)/); const cc = mTxt.match(/결론 한 줄.*?:\s*(.+)/);
  d.confidence = cf ? cf[1].trim() : ''; d.conclusion = cc ? cc[1].trim() : '';
  const bm = raw.match(/\*\*행동재무 경고\*\*[^:]*:\s*(.+)/); d.bfinWarn = bm ? bm[1].trim() : '';
  return d;
}
function tbl(lines){ const tl = lines.filter(l=>l.trim().startsWith('|')); if(tl.length<3) return []; const hdrs = tl[0].split('|').map(s=>cv(s)).filter(Boolean); return tl.slice(2).map(row=>{ const cols = row.split('|').map(s=>cv(s)); const filtered=[];let started=false; for(const c of cols){ if(!started&&!c) continue; started=true; filtered.push(c); } const obj={}; hdrs.forEach((h,i)=>obj[h]=filtered[i]!==undefined?filtered[i]:''); return obj; }).filter(r=>Object.values(r).some(v=>v)); }
function kvMap(lines){ const rows=tbl(lines); const obj={}; rows.forEach(r=>{ const k=Object.keys(r); if(k.length>=2) obj[r[k[0]]]=r[k[1]]; }); return obj; }
function bullets(lines){ return lines.filter(l=>l.trim().startsWith('-')).map(l=>cv(l.replace(/^[-\s]+/,''))).filter(Boolean); }
function splitTbls(text){ const parts=[]; let cur=[]; for(const l of text.split('\n')){ if(!l.trim()){ if(cur.length){ parts.push(cur.join('\n')); cur=[]; } } else cur.push(l); } if(cur.length) parts.push(cur.join('\n')); return parts.filter(p=>p.includes('|')); }
function cv(s){ return String(s).replace(/\*\*/g,'').replace(/⚠️/g,'⚠').trim(); }

function renderAll(){ if(!D) return; renderHeader(); r0(); r1(); r2(); r3(); }
function renderHeader(){
  const total = D.account['총평가']||''; const ret = D.account['수익률 (누적)']||'';
  if(total){ document.getElementById('hdrMeta').style.display='none'; document.getElementById('hdrKpi').style.display='block';
    const retCol = parseFloat(ret)>=0 ? '#86efac' : '#fca5a5';
    document.getElementById('hdrKpi').innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,.4)">${D.date}</div><div class="hdr-kpi"><div><div class="hdr-total">${total}</div><div class="hdr-sub">${D.account['평가금액']||''}</div></div><div class="hdr-ret" style="border-color:${retCol}40;background:${retCol}15;color:${retCol}">${ret.split('(')[0].trim()}</div></div>`;
  }
}
function r0(){
  let h=''; if(D.conclusion) h+=`<div class="concl"><div class="concl-label">⚓ 오늘의 항로</div><div class="concl-text">${D.conclusion}</div>${D.confidence?`<div class="concl-badge"><span class="ms" style="font-size:12px">verified</span>${D.confidence}</div>`:''}</div>`;
  const tEvts = (D.ddays||[]).filter(x=>(x['D-Day']||'').match(/D-0/)); const nEvts = (D.ddays||[]).filter(x=>(x['D-Day']||'').match(/D-1/));
  if(tEvts.length||nEvts.length){ h+=`<div class="sl">⚡ 오늘 이벤트</div>`; tEvts.forEach(e=>{ h+=`<div class="evt today"><span class="evt-tag">TODAY</span><div><div class="evt-time">${e['일시 (KST)']||''}</div><div class="evt-name">${e['이벤트']||''}</div></div></div>`; }); nEvts.forEach(e=>{ h+=`<div class="evt near"><span class="evt-tag">내일</span><div><div class="evt-time">${e['일시 (KST)']||''}</div><div class="evt-name">${e['이벤트']||''}</div></div></div>`; }); }
  if(D.orders&&D.orders.length){ const buys = D.orders.filter(o=>(o['주문']||'').includes('매수')), sells = D.orders.filter(o=>(o['주문']||'').includes('매도')), stops = D.orders.filter(o=>(o['주문']||'').toUpperCase().includes('STOP')); h+=`<div class="sl">📋 주문 ${D.orders.length}건</div>`; if(buys.length){ h+=`<div class="og-label buy"><span class="ms">trending_up</span>매수</div>`; buys.forEach(o=>h+=oc(o,'buy')); } if(sells.length){ h+=`<div class="og-label sell" style="margin-top:6px"><span class="ms">trending_down</span>매도</div>`; sells.forEach(o=>h+=oc(o,'sell')); } if(stops.length){ h+=`<div class="og-label stop" style="margin-top:6px"><span class="ms">block</span>STOP</div>`; stops.forEach(o=>h+=oc(o,'stop')); } }
  if(D.bfinWarn) h+=`<div class="bfin-warn"><div class="bfin-label">⚠ 행동재무 경고</div><div class="bfin-text">${D.bfinWarn}</div></div>`;
  document.getElementById('pane0').innerHTML=h||empty('checklist','오늘 할 일 없음','업데이트 버튼을 누르세요');
}
function oc(o,t){ const ic={buy:'trending_up',sell:'trending_down',stop:'block'}; return `<div class="oc ${t}"><span class="ms oc-icon">${ic[t]}</span><div style="flex:1"><div class="oc-ticker">${o['종목']||''}</div><div class="oc-intent">${o['의도']||o['주문']||''}</div></div><div class="oc-right"><div class="oc-price">${o['가격']||''}</div><div class="oc-qty">${o['수량']||''}</div></div></div>`; }
function r1(){
  let h=''; if(D.holdings&&D.holdings.length){ h+=`<div class="sl">보유 종목</div><div class="hgrid">`; D.holdings.forEach(hd=>{ const ticker=hd['종목']||'', chgRow=(D.changes||[]).find(c=>(c['항목']||'').includes(ticker))||{}, chgVal=chgRow['변화']||'', ret=hd['수익률']||'', pnl=hd['평가손익(USD)']||'', retCol=parseFloat(ret)>=0?'var(--buy)':'var(--stop)', pnlCol=pnl.startsWith('+')?'var(--buy)':pnl.startsWith('-')?'var(--stop)':'var(--sub)', isUp=chgVal.startsWith('+'); h+=`<div class="hcard"><div class="hcard-top"><span class="hticker">${ticker}</span><span class="hret" style="color:${retCol}">${ret}</span></div><div class="hprice">${hd['현재가']||''}</div><div class="hbottom"><span class="hpnl" style="color:${pnlCol}">${pnl}</span>${chgVal?`<span class="hchg ${isUp?'up':'dn'}">${chgVal}</span>`:''}</div><div class="hqty">${hd['보유']||''} 주</div></div>`; }); h+=`</div>`; }
  if(D.changes&&D.changes.length){ h+=`<div class="sl" style="margin-top:14px">직전 대비</div><div class="card">`; D.changes.forEach(c=>{ const delta=c['변화']||'', isUp=delta.startsWith('+'), isDn=delta.startsWith('-'); h+=`<div class="chg-row"><div><div class="chg-ticker">${c['항목']||''}</div><div class="chg-price">${c['직전']||''} → ${c['현재']||''}</div></div>${delta?`<span class="chg-delta ${isUp?'up':isDn?'dn':''}">${delta}</span>`:''}</div>`; }); h+=`</div>`; }
  const usd=D.account['USD 현금']||''; if(usd) h+=`<div class="card"><div style="font-size:9px;font-weight:800;color:var(--sub);letter-spacing:.06em">USD 현금</div><div style="font-family:var(--font-num);font-weight:900;font-size:18px;color:var(--navy);margin-top:4px">${usd}</div></div>`;
  document.getElementById('pane1').innerHTML=h||empty('bar_chart','현황 없음','업데이트 하세요');
}
function r2(){
  let h=''; const kpis=[{l:'총 평가',k:'총평가'},{l:'누적 수익률',k:'수익률 (누적)'},{l:'매매 손익',k:'매매손익'},{l:'환차 손익',k:'환차손익'}]; h+=`<div class="sl">계좌 현황</div><div class="kgrid">`;
  kpis.forEach(({l,k})=>{ const v=D.account[k]||'-', col=v.startsWith('+')?'var(--buy)':v.startsWith('-')?'var(--stop)':'var(--text)'; h+=`<div class="kcard"><div class="klabel">${l}</div><div class="kval" style="color:${col}">${v.split('(')[0].trim()}</div></div>`; }); h+=`</div>`;
  if(D.technicals&&D.technicals.length){ h+=`<div class="sl">기술 지표 (RSI)</div>`; D.technicals.forEach(t=>{ const ticker=t['종목']||''; if(!ticker||ticker==='종목') return; const rsiN=parseRsi(t['RSI']||'50'), rsiC=rsiCol(rsiN), R=16, C=2*Math.PI*R, fill=C*(rsiN/100); h+=`<div class="trow"><div class="tticker">${ticker}</div><div style="position:relative;width:44px;height:44px;flex-shrink:0"><svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="${R}" fill="none" stroke="#e2e8f0" stroke-width="4.5"/><circle cx="22" cy="22" r="${R}" fill="none" stroke="${rsiC}" stroke-width="4.5" stroke-dasharray="${fill} ${C}" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-num);font-weight:900;font-size:11px;color:${rsiC}">${rsiN}</div></div><div class="tinfo"><div style="font-size:12px;font-weight:700">MACD <span style="color:var(--sub)">${t['MACD']||''}</span></div><div class="t50">50일선 ${t['50일선']||''} · 비중 ${t['비중%']||''}</div>${rsiN>=75?`<div class="twarn">⚠ 과매수 구간</div>`:''}</div></div>`; }); }
  if(D.macro&&D.macro.length){ h+=`<div class="sl">매크로</div><div class="mpills">`; D.macro.forEach(m=>{ const wn=m.includes('경고')||m.includes('↑')||m.includes('+'), bg=wn?'#fff7ed':'#fff', bc=wn?'#fed7aa':'var(--border2)'; h+=`<div class="mpill" style="background:${bg};border-color:${bc}">${m}</div>`; }); h+=`</div>`; }
  document.getElementById('pane2').innerHTML=h||empty('speed','지표 없음','업데이트 하세요');
}
function r3(){
  let h=''; if(D.ddays&&D.ddays.length){ h+=`<div class="sl">항로 D-Day</div>`; D.ddays.forEach(e=>{ const dd=e['D-Day']||'', isT=dd.includes('D-0'), isN=dd.match(/D-[12](?!\d)/), bc=isT?'today':isN?'near':''; h+=`<div class="ddcard"><div class="ddbadge ${bc}">${dd}</div><div style="flex:1"><div class="ddevent">${e['이벤트']||''}</div><div class="ddtime">${e['일시 (KST)']||''}</div></div>${isT?`<span class="ms" style="color:var(--stop);font-size:18px">priority_high</span>`:''}</div>`; }); }
  if(D.risks&&D.risks.length){ h+=`<div class="sl">리스크 시나리오</div>`; D.risks.forEach((r,i)=>{ const lvl=i===0?'low':i>=D.risks.length-2?'high':'mid'; h+=`<div class="rcard ${lvl}"><div class="rscen">${r['시나리오']||''}</div>${r['트리거']?`<div class="rtrig">트리거: ${r['트리거']}</div>`:''}${r['대응']?`<div class="ract">${r['대응']}</div>`:''}</div>`; }); }
  const cands=(D.candidates||[]).filter(c=>c['후보']&&c['후보']!=='후보'); if(cands.length){ h+=`<div class="sl">종목 교체 후보</div>`; cands.forEach(c=>h+=`<div class="ccard"><div class="ctop"><span class="cticker">${c['후보']||''}</span>${c['진입가']?`<span class="centry">${c['진입가']}</span>`:''}</div>${c['진입 시점']?`<div style="font-size:10px;color:var(--sub);margin-top:2px">${c['진입 시점']}</div>`:''}${c['근거']?`<div class="creason">${c['근거']}</div>`:''}</div>`); }
  const paidN=parseFloat((D.taxPaid||'0').replace(/[,원]/g,'')), limit=2500000, pct=Math.min(100,Math.round(paidN/limit*100));
  h+=`<div class="sl">양도세 트래커</div><div class="taxwrap"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:700">누적 매매익</span><span style="font-family:var(--font-num);font-size:12px;font-weight:800;color:var(--sky)">${pct}% / 250만 한도</span></div><div class="taxbar-bg"><div class="taxbar-fill" id="taxFill" style="width:0%"></div></div><div style="font-size:11px;color:var(--sub)">${D.taxPaid} · 22% 세율</div></div>`;
  if(D.sectors&&D.sectors.length){ h+=`<div class="sl">섹터 동조</div>`; D.sectors.forEach(s=>h+=`<div class="card" style="font-size:12px;color:var(--text)">${s}</div>`); }
  document.getElementById('pane3').innerHTML=h; setTimeout(()=>{ const f=document.getElementById('taxFill'); if(f) f.style.width=pct+'%'; },50);
}

function setTab(i){ document.querySelectorAll('.tab-pane').forEach((p,j)=>p.classList.toggle('active',i===j)); document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',i===j)); document.getElementById('tabContent').scrollTop=0; }
function showInput(){ document.getElementById('inputTxt').value = D ? D.raw : ''; document.getElementById('inputOverlay').style.display='flex'; }
function hideInput(){ document.getElementById('inputOverlay').style.display='none'; }
function showHistory(){ const list = document.getElementById('historyList'); if(!logsData.length) list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--sub)">기록 없음</div>'; else { list.innerHTML = logsData.map(item => { let sum = { total:'', ret:'' }; try{ sum = JSON.parse(item.summary_json); }catch(e){} return `<div class="his-item"><div class="his-info" onclick="loadDetail('${item.id}')"><div class="his-date">${item.display_date}</div><div class="his-sum">${sum.total||''} (${sum.ret||''})</div></div><div class="del-btn" onclick="deleteItem('${item.id}')"><span class="ms">delete</span></div></div>`; }).join(''); } document.getElementById('historyOverlay').style.display='flex'; }
function hideHistory(){ document.getElementById('historyOverlay').style.display='none'; }
function loadDetail(id){ const t = logsData.find(x => x.id === id); if(t) { applyData(t); hideHistory(); toast('📅 '+t.display_date+' 로드'); } }
function parseRsi(s){ const m=String(s).match(/(\d+)/); return m?parseInt(m[1]):50; }
function rsiCol(v){ return v>=75?'#dc2626':v>=60?'#d97706':v>=45?'#16a34a':'#2563eb'; }
function empty(icon,title,sub){ return `<div class="empty"><span class="ms">${icon}</span><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
</script>
</body>
</html>
