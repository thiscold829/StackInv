<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>StackInv</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
<style>
/* ── TOKENS ── */
:root{
  --bg:#f0f9ff; --white:#fff;
  --navy:#0c1a2e; --navy2:#1e3a5f;
  --sky:#0284c7; --sky-lt:#38bdf8; --sky-pale:#e0f2fe;
  --border:#bae6fd; --border2:#e0f2fe;
  --text:#0f172a; --text2:#334155; --sub:#64748b; --sub-lt:#94a3b8;
  --buy:#16a34a; --sell:#2563eb; --stop:#dc2626; --warn:#d97706;
  --fn:'Space Grotesk',sans-serif;
  --fb:'Pretendard','Apple SD Gothic Neo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--fb);background:#dbeafe;color:var(--text);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
.app{max-width:480px;width:100%;height:100dvh;margin:0 auto;display:flex;flex-direction:column;background:var(–bg);position:relative;overflow:hidden}
.ms{font-family:‘Material Symbols Outlined’;font-weight:normal;font-style:normal;display:inline-block;line-height:1;text-transform:none;letter-spacing:normal;white-space:nowrap;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr{background:var(–navy);padding:12px 16px 10px;flex-shrink:0;z-index:10}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.brand{font-family:var(–fn);font-weight:900;font-size:18px;letter-spacing:-.04em;color:#fff;display:flex;align-items:center;gap:6px}
.brand .ms{font-size:18px;color:var(–sky-lt)}
.hbtns{display:flex;align-items:center;gap:6px}
.hbtn{min-height:36px;min-width:36px;background:rgba(255,255,255,.1);border:none;border-radius:9px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;padding:0 10px;gap:4px;font-family:var(–fn);font-weight:800;font-size:11px}
.hbtn:active{background:rgba(255,255,255,.2);transform:scale(.96)}
.hbtn .ms{font-size:16px}
.hbtn.acc{background:var(–sky-lt);color:var(–navy)}
.hdr-meta{font-size:11px;color:rgba(255,255,255,.4)}
.hdr-kpi{display:none}
.hdr-kpi.on{display:block}
.hdr-total{font-family:var(–fn);font-weight:900;font-size:22px;color:#fff;letter-spacing:-.03em;line-height:1.1}
.hdr-r2{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.4)}
.hdr-ret{font-family:var(–fn);font-weight:800;font-size:13px;padding:3px 11px;border-radius:20px;border:1px solid}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(–sub-lt);display:inline-block;transition:.3s}
.sync-dot.saving{background:var(–warn);animation:pulse .8s infinite}
.sync-dot.saved{background:var(–buy)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── ALERT BAR ── */
.alert-bar{display:none;background:#fff7ed;border-bottom:1.5px solid #fed7aa;padding:11px 16px;flex-shrink:0;cursor:pointer;align-items:center;gap:9px}
.alert-bar.on{display:flex}
.alert-bar .ms{color:var(–warn);font-size:18px;flex-shrink:0}
.alert-txt{flex:1;font-size:12px;font-weight:700;color:#92400e}
.alert-cta{font-size:11px;font-weight:800;color:var(–warn);border:1px solid #fde68a;background:#fef3c7;border-radius:6px;padding:3px 9px;white-space:nowrap}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.pane{display:none;padding:14px 14px 84px}
.pane.on{display:block}

/* ── TABBAR ── */
.tabs{position:absolute;bottom:0;left:0;right:0;background:var(–white);border-top:1px solid var(–border2);display:flex;padding-bottom:max(env(safe-area-inset-bottom),4px);z-index:20;box-shadow:0 -2px 14px rgba(0,0,0,.07)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 5px;background:none;border:none;cursor:pointer;color:var(–sub-lt);font-family:var(–fb);font-weight:700;font-size:10px;gap:3px;min-height:56px;transition:.15s;letter-spacing:.01em}
.tab .ms{font-size:22px}
.tab.on{color:var(–sky)}
.tab.on .ms{font-variation-settings:‘FILL’ 1}

/* ── SECTION LABEL ── */
.sl{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(–sub);text-transform:uppercase;margin:16px 0 8px}
.sl:first-child{margin-top:0}

/* ── CONCLUSION ── */
.concl{background:var(–navy);border-radius:16px;padding:14px 16px;margin-bottom:10px}
.concl-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(–sky-lt);margin-bottom:5px}
.concl-txt{font-size:13px;line-height:1.6;color:rgba(255,255,255,.9)}
.concl-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);color:var(–sky-lt);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800}

/* ── EVENT ── */
.evt{background:var(–white);border:1px solid;border-left:4px solid;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:11px;margin-bottom:7px;min-height:52px}
.evt.today{border-color:#fecaca;border-left-color:var(–stop);background:#fff8f8}
.evt.near{border-color:#fde68a;border-left-color:var(–warn);background:#fffbeb}
.evt.far{border-color:var(–border2);border-left-color:var(–sky)}
.evt-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;flex-shrink:0}
.evt.today .evt-tag{background:#fee2e2;color:var(–stop)}
.evt.near .evt-tag{background:#fef3c7;color:var(–warn)}
.evt.far .evt-tag{background:var(–sky-pale);color:var(–sky)}
.evt-time{font-size:10px;color:var(–sub)}
.evt-name{font-size:13px;font-weight:700;margin-top:2px}

/* ── ORDER ── */
.og{font-size:10px;font-weight:800;padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin-bottom:6px;margin-top:4px}
.og .ms{font-size:13px}
.og.buy{background:#dcfce7;color:var(–buy)}
.og.sell{background:#dbeafe;color:var(–sell)}
.og.stop{background:#fee2e2;color:var(–stop)}
.oc{background:var(–white);border:1px solid var(–border2);border-left:4px solid;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px;min-height:56px}
.oc.buy{border-left-color:var(–buy)}
.oc.sell{border-left-color:var(–sell)}
.oc.stop{border-left-color:var(–stop);background:#fff8f8}
.oc .ms{font-size:22px}
.oc.buy .ms{color:var(–buy)}
.oc.sell .ms{color:var(–sell)}
.oc.stop .ms{color:var(–stop)}
.oc-mid{flex:1}
.oc-ticker{font-family:var(–fn);font-weight:900;font-size:15px}
.oc-intent{font-size:11px;color:var(–sub);margin-top:1px}
.oc-price{font-family:var(–fn);font-weight:800;font-size:14px;text-align:right}
.oc-qty{font-size:10px;color:var(–sub);text-align:right;margin-top:1px}

/* ── BEHAVIOR WARN ── */
.bwarn{background:#fffbeb;border:1px solid #fde68a;border-left:4px solid var(–warn);border-radius:12px;padding:12px 14px;margin-top:8px}
.bwarn-lbl{font-size:9px;font-weight:800;color:var(–warn);letter-spacing:.08em;margin-bottom:4px}
.bwarn-txt{font-size:12px;color:#92400e;line-height:1.55}

/* ── STOCK CARDS ── */
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.hcard{background:var(–white);border:1px solid var(–border2);border-radius:14px;padding:13px 13px 11px;position:relative;overflow:hidden}
.hcard::before{content:’’;position:absolute;top:0;left:0;right:0;height:3px}
.hcard.pos::before{background:var(–buy)}
.hcard.neg::before{background:var(–stop)}
.hcard.neu::before{background:var(–sub-lt)}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
.hc-ticker{font-family:var(–fn);font-weight:900;font-size:14px;color:var(–navy)}
.hc-ret{font-family:var(–fn);font-weight:800;font-size:11px;padding:2px 7px;border-radius:5px}
.hcard.pos .hc-ret{background:#dcfce7;color:var(–buy)}
.hcard.neg .hc-ret{background:#fee2e2;color:var(–stop)}
.hcard.neu .hc-ret{background:#f1f5f9;color:var(–sub)}
.hc-price{font-family:var(–fn);font-weight:900;font-size:19px;color:var(–navy);letter-spacing:-.02em}
.hc-row{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.hc-pnl{font-family:var(–fn);font-size:11px;font-weight:700}
.hc-chg{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px}
.hc-chg.up{background:#dcfce7;color:var(–buy)}
.hc-chg.dn{background:#fee2e2;color:var(–stop)}
.hc-qty{font-size:10px;color:var(–sub-lt);margin-top:3px}

/* ── DELTA TABLE ── */
.dtable{background:var(–white);border-radius:13px;border:1px solid var(–border2);overflow:hidden}
.drow{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(–border2);gap:10px}
.drow:last-child{border-bottom:none}
.d-tick{font-family:var(–fn);font-weight:700;font-size:13px;width:52px;flex-shrink:0}
.d-px{flex:1;font-size:11px;color:var(–sub)}
.d-delta{font-family:var(–fn);font-weight:800;font-size:12px;padding:3px 9px;border-radius:6px}
.d-delta.up{background:#dcfce7;color:var(–buy)}
.d-delta.dn{background:#fee2e2;color:var(–stop)}

/* ── USD CARD ── */
.usd-card{background:linear-gradient(135deg,var(–navy) 0%,var(–navy2) 100%);border-radius:14px;padding:14px 16px;margin-top:9px;display:flex;justify-content:space-between;align-items:center}
.usd-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.05em}
.usd-val{font-family:var(–fn);font-weight:900;font-size:20px;color:#fff;margin-top:3px}
.usd-krw{font-size:11px;color:var(–sky-lt);margin-top:2px}
.usd-r{text-align:right;font-size:11px;color:rgba(255,255,255,.5)}

/* ── KPI GRID ── */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kcard{background:var(–white);border-radius:14px;border:1px solid var(–border2);padding:13px}
.k-lbl{font-size:9px;font-weight:800;color:var(–sub);text-transform:uppercase;letter-spacing:.06em}
.k-val{font-family:var(–fn);font-weight:900;font-size:17px;margin-top:5px;line-height:1.1}

/* ── TECH ROW ── */
.trow{background:var(–white);border:1px solid var(–border2);border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.t-tick{font-family:var(–fn);font-weight:900;font-size:13px;width:40px;flex-shrink:0}
.t-rsi{position:relative;width:46px;height:46px;flex-shrink:0}
.t-rsi-v{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(–fn);font-weight:900;font-size:11px}
.t-info{flex:1;min-width:0}
.t-macd{font-size:12px;font-weight:600}
.t-50{font-size:10px;color:var(–sub);margin-top:2px}
.t-warn{font-size:10px;font-weight:800;color:var(–stop);margin-top:3px}

/* ── PILLS ── */
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{background:var(–white);border:1px solid var(–border2);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;line-height:1.45}
.pill.w{background:#fffbeb;border-color:#fde68a}

/* ── DDAY ── */
.ddrow{background:var(–white);border:1px solid var(–border2);border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;min-height:56px}
.dd-badge{font-family:var(–fn);font-weight:900;font-size:12px;background:var(–navy);color:#fff;border-radius:8px;padding:5px 9px;min-width:44px;text-align:center;flex-shrink:0;line-height:1.2}
.dd-badge.today{background:var(–stop)}
.dd-badge.near{background:var(–warn)}
.dd-badge.big{background:var(–sky)}
.dd-event{font-size:13px;font-weight:700}
.dd-time{font-size:10px;color:var(–sub);margin-top:2px}

/* ── RISK ── */
.rcard{background:var(–white);border:1px solid var(–border2);border-left:4px solid;border-radius:13px;padding:12px 14px;margin-bottom:8px}
.rcard.low{border-left-color:var(–sub-lt)}
.rcard.mid{border-left-color:var(–warn)}
.rcard.high{border-left-color:var(–stop)}
.r-scen{font-weight:700;font-size:13px}
.r-trig{font-size:11px;color:var(–sub);margin-top:3px}
.r-act{font-size:11px;color:var(–sky);font-weight:600;margin-top:4px}

/* ── CANDIDATE ── */
.ccard{background:var(–white);border:1px solid var(–border2);border-left:4px solid var(–sky);border-radius:13px;padding:12px 14px;margin-bottom:8px}
.c-top{display:flex;justify-content:space-between;align-items:center}
.c-ticker{font-family:var(–fn);font-weight:900;font-size:14px}
.c-entry{font-size:11px;font-weight:700;color:var(–buy)}
.c-reason{font-size:11px;color:var(–sub);margin-top:4px;line-height:1.45}

/* ── TAX ── */
.taxcard{background:var(–white);border:1px solid var(–border2);border-radius:13px;padding:14px}
.tax-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tax-lbl{font-size:12px;font-weight:700}
.tax-pct{font-family:var(–fn);font-size:12px;font-weight:800;color:var(–sky)}
.tax-bg{height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-bottom:6px}
.tax-fill{height:100%;background:linear-gradient(90deg,var(–sky),var(–sky-lt));border-radius:99px;transition:width 1.2s ease;width:0%}
.tax-sub{font-size:11px;color:var(–sub)}

/* ── CARD ── */
.card{background:var(–white);border:1px solid var(–border2);border-radius:13px;padding:12px 14px;margin-bottom:8px;font-size:12px;line-height:1.55;color:var(–text2)}

/* ── OVERLAYS ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:var(–white);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:20px 18px;max-height:88dvh;overflow-y:auto;animation:su .35s cubic-bezier(.16,1,.3,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:4px;background:#e2e8f0;border-radius:99px;margin:0 auto 16px}
.sh-title{font-family:var(–fn);font-weight:700;font-size:17px;margin-bottom:12px}
.inp-lbl{display:block;font-size:10px;font-weight:800;color:var(–sub);letter-spacing:.06em;margin-bottom:5px}
.inp{width:100%;background:#f8fafc;border:1.5px solid var(–border2);border-radius:12px;padding:12px 13px;font-size:12px;font-family:var(–fb);resize:none;outline:none;color:var(–text);transition:.2s;line-height:1.5}
.inp:focus{border-color:var(–sky);background:#fff}
textarea.inp{height:180px}
.btn-p{width:100%;padding:14px;background:var(–navy);color:#fff;border:none;border-radius:13px;font-family:var(–fn);font-weight:800;font-size:14px;cursor:pointer;transition:.15s;margin-top:12px;min-height:50px}
.btn-p:active{transform:scale(.98)}
.btn-g{width:100%;padding:12px;background:none;border:none;color:var(–sub);font-family:var(–fb);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;min-height:44px}

/* ── HISTORY ── */
.hi{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:13px;border:1px solid var(–border2);background:var(–white);margin-bottom:8px;cursor:pointer;transition:.15s;min-height:56px}
.hi:active{background:var(–sky-pale);transform:scale(.99)}
.hi-date{font-family:var(–fn);font-weight:900;font-size:14px;flex:1}
.hi-meta{text-align:right}
.hi-total{font-family:var(–fn);font-weight:700;font-size:12px;color:var(–text2)}
.hi-ret{font-size:11px;font-weight:800;margin-top:2px}
.hi-del{width:36px;height:36px;background:#fee2e2;border:none;border-radius:9px;color:var(–stop);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;min-width:36px}
.hi-del:active{background:#fecaca}
.hi-del .ms{font-size:18px}

/* ── EMPTY / LOADING / TOAST ── */
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;text-align:center}
.empty .ms{font-size:44px;color:#cbd5e1;margin-bottom:10px}
.empty-t{font-weight:700;font-size:15px;color:var(–sub)}
.empty-s{font-size:12px;color:#cbd5e1;margin-top:5px;line-height:1.5}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:8px;color:var(–sub);font-size:13px}
.spinner{width:18px;height:18px;border:2.5px solid var(–border);border-top-color:var(–sky);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(12,26,46,.92);color:#fff;padding:9px 22px;border-radius:99px;font-size:12px;font-weight:700;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.12)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(8px)}

/* ── PC ── */
@media(min-width:480px){
body{display:flex;align-items:center;justify-content:center;height:100vh}
.app{box-shadow:0 0 60px rgba(0,0,0,.15);border-radius:24px}
}
</style>

</head>
<body>
<div class="app">

  <!-- HEADER -->

  <header class="hdr">
    <div class="hdr-r1">
      <div class="brand"><span class="ms">anchor</span>StackInv</div>
      <div class="hbtns">
        <span class="sync-dot" id="syncDot"></span>
        <button class="hbtn" onclick="openHistory()"><span class="ms">history</span></button>
        <button class="hbtn" onclick="manualSync()" title="수동 동기화"><span class="ms">cloud_sync</span></button>
        <button class="hbtn acc" onclick="openInput()"><span class="ms">upload_file</span>업데이트</button>
      </div>
    </div>
    <div id="hdrMeta" class="hdr-meta">연결 중...</div>
    <div id="hdrKpi" class="hdr-kpi">
      <div class="hdr-total" id="hdrTotal"></div>
      <div class="hdr-r2">
        <div class="hdr-sub" id="hdrSub"></div>
        <div class="hdr-ret" id="hdrRet"></div>
      </div>
    </div>
  </header>

  <!-- ALERT BAR -->

  <div class="alert-bar" id="alertBar" onclick="openInput()">
    <span class="ms">notification_important</span>
    <div class="alert-txt">오늘 브리핑이 아직 없습니다.</div>
    <div class="alert-cta">지금 입력 →</div>
  </div>

  <!-- CONTENT -->

  <div class="content" id="content">
    <div class="pane on" id="p0"></div>
    <div class="pane" id="p1"></div>
    <div class="pane" id="p2"></div>
    <div class="pane" id="p3"></div>
  </div>

  <!-- TABBAR -->

  <nav class="tabs">
    <button class="tab on"  onclick="setTab(0)"><span class="ms">checklist</span>오늘 할 일</button>
    <button class="tab"     onclick="setTab(1)"><span class="ms">bar_chart</span>현황</button>
    <button class="tab"     onclick="setTab(2)"><span class="ms">speed</span>계기반</button>
    <button class="tab"     onclick="setTab(3)"><span class="ms">navigation</span>항로</button>
  </nav>
</div>

<!-- INPUT OVERLAY -->

<div class="ov" id="ovInput">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">⚓ 브리핑 업데이트</div>
    <p style="font-size:12px;color:var(--sub);margin-bottom:11px">Claude 브리핑 텍스트를 그대로 붙여넣으세요</p>
    <label class="inp-lbl">BRIEFING TEXT</label>
    <textarea id="txtInput" class="inp" placeholder="# 📊 일일 브리핑 (5/13 KST 15:25)&#10;## A. 캡처 정확 옮김&#10;..."></textarea>
    <button class="btn-p" onclick="applyInput()">⚓ 파싱 &amp; DB 저장</button>
    <button class="btn-g" onclick="closeInput()">취소</button>
  </div>
</div>

<!-- HISTORY OVERLAY -->

<div class="ov" id="ovHist">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sh-title" style="margin:0">📅 히스토리</div>
      <button class="hbtn" style="background:#f1f5f9;color:var(--text)" onclick="loadHistoryList()"><span class="ms">refresh</span></button>
    </div>
    <div id="histList"></div>
    <button class="btn-g" onclick="closeHistory()">닫기</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════
   STATE
════════════════════════════ */
let D = null, HIST = [], curTab = 0;

/* ════════════════════════════
   INIT
════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  ['ovInput','ovHist'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e){
      if (e.target === this) this.classList.remove('on');
    });
  });
  if (typeof CONFIG === 'undefined' || !CONFIG?.API_URL) {
    setMeta('⚠️ config.js 미설정'); renderEmpty(); return;
  }
  setMeta('DB 연결 중...');
  const res = await apiGet({ action:'list' });
  if (res?.ok && res.data?.length) { HIST = res.data; await loadRecord(HIST[0].id, false); }
  else { loadLocal(); }
  checkToday();
});

function loadLocal() {
  const s = localStorage.getItem('inv_data');
  if (s) try { D = JSON.parse(s); renderAll(); return; } catch(e) {}
  setMeta('데이터 없음 — 업데이트 버튼으로 시작');
}
function renderEmpty() {
  ['p0','p1','p2','p3'].forEach(id =>
    document.getElementById(id).innerHTML = emptyHtml('anchor','데이터 없음','업데이트 버튼을 눌러<br>브리핑 텍스트를 붙여넣으세요'));
}

/* ════════════════════════════
   DATE UTILS
════════════════════════════ */
function todayId() {
  const n = new Date();
  return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function extractId(raw) {
  // 1순위: 브리핑 제목 안 날짜
  let m = raw.match(/브리핑\s*[（(（]\s*(\d{1,2})\/(\d{1,2})/);
  if (m) return `${new Date().getFullYear()}-${pad(+m[1])}-${pad(+m[2])}`;
  // 2순위: (M/D KST) 패턴
  m = raw.match(/[（(（]\s*(\d{1,2})\/(\d{1,2})\s*KST/);
  if (m) return `${new Date().getFullYear()}-${pad(+m[1])}-${pad(+m[2])}`;
  // 3순위: M/D KST 텍스트 패턴
  m = raw.match(/(\d{1,2})\/(\d{1,2})\s*KST/);
  if (m) return `${new Date().getFullYear()}-${pad(+m[1])}-${pad(+m[2])}`;
  return todayId();
}
function extractDisplay(raw) {
  const m = raw.match(/브리핑\s*[（(（](.+?)[)））]/);
  return m ? m[1].trim() : todayId();
}
function checkToday() {
  const tid = todayId();
  const has = HIST.some(h => h.id === tid) || (D?.dateId === tid);
  document.getElementById('alertBar').classList.toggle('on', !has);
}

/* ════════════════════════════
   API — GET
════════════════════════════ */
async function apiGet(params) {
  try {
    const url = CONFIG.API_URL + '?' + new URLSearchParams(params);
    const res = await fetch(url, { redirect:'follow' });
    return await res.json();
  } catch(e) { console.warn('GET fail', e); return null; }
}

/* ════════════════════════════
   API — POST (text/plain → no preflight)
════════════════════════════ */
async function apiPost(payload) {
  try {
    await fetch(CONFIG.API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=UTF-8' },
      body: JSON.stringify(payload),
      redirect:'follow'
    });
    return { ok: true };
  } catch(e) { console.warn('POST fail', e); return null; }
}

function dot(s) {
  const el = document.getElementById('syncDot');
  el.className = 'sync-dot' + (s==='saving'?' saving': s==='saved'?' saved':'');
}

/* ════════════════════════════
   SYNC
════════════════════════════ */
async function syncToDb() {
  if (!D) return null;
  dot('saving');
  const summary = JSON.stringify({
    total: fcol(D.account, 0, '총평가') || '',
    ret:   fcol(D.account, 1, '수익률 (누적)', '수익률') || '',
    cash:  fcol(D.account, 5, 'USD 현금','USD현금') || '',
    orders: D.orders?.length || 0,
    concl: D.conclusion || ''
  });
  const result = await apiPost({
    action:'upsert', id:D.dateId, display_date:D.displayDate,
    summary_json: summary,
    full_json: JSON.stringify(D),
    raw_text: encodeURIComponent(D.raw || '')
  });
  if (result?.ok) { dot('saved'); setTimeout(()=>dot('idle'),3000); }
  else dot('idle');
  return result;
}

async function dbUpload() {
  if (!D) { toast('데이터 없음'); return; }
  toast('☁️ DB 업로드 중...');
  const r = await syncToDb();
  toast(r?.ok ? '✅ DB 업로드 완료' : '⚠️ 업로드 실패');
}

/* ════════════════════════════
   PARSE HELPERS
════════════════════════════ */

// 마크업·공백 제거
function cv(s) {
  return String(s).replace(/\*\*/g,'').replace(/⚠️/g,'⚠').replace(/^\s+|\s+$/g,'');
}

// 테이블 파싱 — 각 행에 _vals[] 위치 배열 추가
function tbl(lines) {
  const rows = lines.filter(l => l.trim().startsWith('|'));
  if (rows.length < 3) return [];
  const hdrs = rows[0].split('|').map(cv).filter(Boolean);
  return rows.slice(2).map(row => {
    const raw = row.split('|').map(cv);
    // 앞 빈 셀 제거
    while (raw.length && !raw[0]) raw.shift();
    // 뒤 빈 셀 제거
    while (raw.length && !raw[raw.length-1]) raw.pop();
    const obj = { _vals: raw };
    hdrs.forEach((h, i) => { obj[h] = raw[i] !== undefined ? raw[i] : ''; });
    return obj;
  }).filter(r => r._vals.some(v => v));
}

// KV 맵 (2컬럼 테이블)
function kv(lines) {
  const obj = { _vals: [] };
  tbl(lines).forEach(r => {
    const k = Object.keys(r).filter(k => k !== '_vals');
    if (k.length >= 2) {
      obj[r[k[0]]] = r[k[1]];
      obj._vals.push([r[k[0]], r[k[1]]]);
    }
  });
  return obj;
}

// 불릿 — -, •, *, 숫자. 모두 처리
function blt(lines) {
  return lines
    .filter(l => /^\s*(?:[-•*]|\d+[.)]) /.test(l))
    .map(l => cv(l.replace(/^\s*(?:[-•*]|\d+[.)]) +/, ''))).filter(Boolean);
}

// 테이블 블록 분리 (공백줄 기준)
function splitTbls(text) {
  const parts = []; let cur = [];
  for (const l of text.split('\n')) {
    if (!l.trim()) { if (cur.length) { parts.push(cur.join('\n')); cur = []; } }
    else cur.push(l);
  }
  if (cur.length) parts.push(cur.join('\n'));
  return parts.filter(p => p.includes('|'));
}

/* ── 키 접근 헬퍼 ── */

// fg: 이름 기반 퍼지 (공백·괄호 무시 + 부분 일치)
function fg(obj, ...keys) {
  if (!obj) return '';
  for (const k of keys) {
    if (obj[k] !== undefined && String(obj[k]).trim()) return String(obj[k]).trim();
    const nk = k.replace(/[\s()\[\]]/g,'').toLowerCase();
    const fk = Object.keys(obj).find(ok =>
      ok !== '_vals' && ok.replace(/[\s()\[\]]/g,'').toLowerCase() === nk
    );
    if (fk && String(obj[fk]).trim()) return String(obj[fk]).trim();
    // 부분 포함
    const ck = Object.keys(obj).find(ok => {
      if (ok === '_vals') return false;
      const on = ok.replace(/[\s()\[\]]/g,'').toLowerCase();
      return on.includes(nk) || (nk.length > 2 && nk.includes(on.slice(0,3)));
    });
    if (ck && String(obj[ck]).trim()) return String(obj[ck]).trim();
  }
  return '';
}

// fp: 위치 기반 (0-indexed)
function fp(obj, n) {
  return (obj?._vals?.[n] !== undefined) ? String(obj._vals[n]).trim() : '';
}

// fcol: 이름 우선, 없으면 위치 fallback
function fcol(obj, pos, ...names) {
  const byName = fg(obj, ...names);
  return byName || fp(obj, pos);
}

/* ════════════════════════════
   MAIN PARSER
════════════════════════════ */
function parseInv(raw) {
  const d = { raw };
  d.dateId      = extractId(raw);
  d.displayDate = extractDisplay(raw);

  // 섹션 분리: ## A. / A. / # A. 모두 처리
  const lines = raw.split('\n');
  const secs = {}; let cur = null;
  for (const l of lines) {
    const m = l.match(/^(?:#{1,3}\s*)?([A-M])[.。]\s/);
    if (m) { cur = m[1]; secs[cur] = []; }
    else if (cur) secs[cur].push(l);
  }

  d.holdings   = tbl(secs.A || []);
  d.account    = kv(secs.B || []);

  const cParts = splitTbls((secs.C || []).join('\n'));
  d.technicals = tbl((cParts[0]||'').split('\n'));
  d.triggers   = tbl((cParts[1]||'').split('\n'));

  d.changes    = tbl(secs.D || []);
  d.macro      = blt(secs.E || []);
  d.sectors    = blt(secs.F || []);
  d.ddays      = tbl(secs.G || []);
  d.risks      = tbl(secs.H || []);
  d.orders     = tbl(secs.I || []);
  d.candidates = tbl(secs.L || []);

  // K: 양도세 — 다양한 형태 대응
  const kTxt = (secs.K||[]).join('\n');
  const kRows = tbl(secs.K||[]);
  d.taxPaid =
    kTxt.match(/누적 매매익.*?(\d[\d,]+원)/)?.[1] ||
    kTxt.match(/양도소득금액[^|\n]*?(\d[\d,]+원)/)?.[1] ||
    kTxt.match(/합계[^|\n]*?[+]?(\d[\d,]+원)/)?.[1] ||
    (() => { // 테이블 마지막 행의 마지막 숫자값
      const last = kRows[kRows.length-1];
      if (!last) return null;
      for (let i = last._vals.length-1; i >= 0; i--) {
        const v = last._vals[i]; if (/\d[\d,]+원/.test(v)) return v.replace(/[+]/,'');
      }
      return null;
    })() ||
    '0원';

  // M: 결론/확신
  const mTxt = (secs.M||[]).join('\n');
  d.confidence = mTxt.match(/확신[^:：]*[:：]\s*(.+)/)?.[1]?.trim() || '';
  d.conclusion = (
    mTxt.match(/결론 한 줄[^:：]*[:：]\s*(.+)/) ||
    mTxt.match(/결론[^:：]*[:：]\s*(.+)/)
  )?.[1]?.trim() || '';

  // 행동재무 경고
  d.bfinWarn = (
    raw.match(/\*\*행동재무 경고\*\*[^:：]*[:：]\s*(.+)/) ||
    raw.match(/행동재무 경고[^:：]*[:：]\s*(.+)/)
  )?.[1]?.trim() || '';

  return d;
}

/* ════════════════════════════
   APPLY INPUT
════════════════════════════ */
async function applyInput() {
  const raw = document.getElementById('txtInput').value.trim();
  if (!raw) { toast('텍스트를 붙여넣으세요'); return; }
  D = parseInv(raw);
  localStorage.setItem('inv_data', JSON.stringify(D));
  closeInput(); renderAll();
  toast('☁️ DB 저장 중...');
  const r = await syncToDb();
  toast(r?.ok ? '✅ DB 저장 완료' : '⚠️ 저장 실패 — API 확인');
  const res = await apiGet({ action:'list' });
  if (res?.ok) HIST = res.data;
  checkToday();
}

/* ════════════════════════════
   HISTORY
════════════════════════════ */
function openHistory()  { renderHistList(); document.getElementById('ovHist').classList.add('on'); }
function closeHistory() { document.getElementById('ovHist').classList.remove('on'); }

async function loadHistoryList() {
  document.getElementById('histList').innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  const res = await apiGet({ action:'list' });
  if (res?.ok) HIST = res.data;
  renderHistList();
}

function renderHistList() {
  const el = document.getElementById('histList');
  if (!HIST.length) { el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--sub-lt);font-size:13px">저장된 히스토리 없음</div>'; return; }
  const tid = todayId();
  el.innerHTML = HIST.map(h => {
    let s = {}; try { s = JSON.parse(h.summary_json); } catch(e) {}
    const ret = s.ret||'', retN = parseFloat(ret);
    const rc = retN>0?'var(--buy)':retN<0?'var(--stop)':'var(--sub)';
    const isT = h.id === tid;
    return `<div class="hi" onclick="selectRecord('${h.id}')">
      <div style="flex:1;min-width:0">
        <div class="hi-date">${h.id}${isT?' <span style="font-size:9px;background:#dcfce7;color:var(--buy);padding:1px 5px;border-radius:4px;font-weight:800;vertical-align:middle">TODAY</span>':''}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.display_date||''}</div>
      </div>
      <div class="hi-meta">
        <div class="hi-total">${s.total||'—'}</div>
        <div class="hi-ret" style="color:${rc}">${ret||'—'}</div>
      </div>
      <button class="hi-del" onclick="event.stopPropagation();deleteRecord('${h.id}')">
        <span class="ms">delete</span>
      </button>
    </div>`;
  }).join('');
}

async function selectRecord(id) { closeHistory(); await loadRecord(id, true); }

async function loadRecord(id, showMsg) {
  if (showMsg) toast('불러오는 중...');
  const res = await apiGet({ action:'read', id });
  if (!res?.ok || !res.data) { if (showMsg) toast('불러오기 실패'); return; }
  try {
    D = JSON.parse(res.data.full_json);
    try { document.getElementById('txtInput').value = decodeURIComponent(res.data.raw_text||''); } catch(e) {}
    localStorage.setItem('inv_data', JSON.stringify(D));
    renderAll();
    if (showMsg) toast(`✅ ${id} 복원됨`);
  } catch(e) { if (showMsg) toast('데이터 오류'); }
}

async function deleteRecord(id) {
  if (!confirm(`[${id}] 기록을 삭제할까요?`)) return;
  toast('🗑 삭제 중...'); dot('saving');
  await apiPost({ action:'delete', id });
  dot('saved');
  const res = await apiGet({ action:'list' });
  if (res?.ok) HIST = res.data;
  renderHistList();
  toast('🗑 삭제됨');
  if (D?.dateId === id) { D = null; localStorage.removeItem('inv_data'); renderAll(); }
  checkToday();
  setTimeout(()=>dot('idle'),3000);
}

/* ════════════════════════════
   RENDER
════════════════════════════ */
function renderAll() {
  if (!D) { renderEmpty(); setMeta('데이터 없음'); return; }
  renderHeader(); rP0(); rP1(); rP2(); rP3();
}

function renderHeader() {
  const total = fcol(D.account, 0, '총평가');
  const ret   = fcol(D.account, 1, '수익률 (누적)', '수익률');
  const retN  = parseFloat(ret);
  if (total) {
    document.getElementById('hdrMeta').style.display = 'none';
    document.getElementById('hdrKpi').classList.add('on');
    document.getElementById('hdrTotal').textContent = total;
    document.getElementById('hdrSub').textContent = D.displayDate || '';
    const el = document.getElementById('hdrRet');
    el.textContent = ret.split('(')[0].trim();
    if (retN > 0)      el.style.cssText = 'background:rgba(134,239,172,.15);border-color:rgba(134,239,172,.35);color:#86efac';
    else if (retN < 0) el.style.cssText = 'background:rgba(252,165,165,.15);border-color:rgba(252,165,165,.35);color:#fca5a5';
    else               el.style.cssText = 'background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.6)';
  } else {
    setMeta(D.displayDate || '데이터 있음');
  }
}

function setMeta(t) {
  const m = document.getElementById('hdrMeta');
  m.textContent = t; m.style.display = 'block';
  document.getElementById('hdrKpi').classList.remove('on');
}

/* ── P0: 오늘 할 일 ── */
function rP0() {
  let h = '';

  // 결론 배너
  if (D.conclusion) {
    h += `<div class="concl"><div class="concl-lbl">⚓ 오늘의 항로</div>
      <div class="concl-txt">${D.conclusion}</div>
      ${D.confidence ? `<div class="concl-badge"><span class="ms" style="font-size:12px">verified</span>${D.confidence}</div>` : ''}
    </div>`;
  }

  // 오늘/내일 이벤트 (D-0, D-1)
  const ddKey = e => fcol(e, 0, 'D-Day','D','d-day','D-day');
  const t0 = (D.ddays||[]).filter(e => /D-0/.test(ddKey(e)));
  const t1 = (D.ddays||[]).filter(e => /D-1(?!\d)/.test(ddKey(e)));
  if (t0.length || t1.length) {
    h += `<div class="sl">⚡ 오늘 이벤트</div>`;
    t0.forEach(e => h += evtCard(e,'today','TODAY'));
    t1.forEach(e => h += evtCard(e,'near','내일'));
  }

  // 주문 (I섹션) — 주문 컬럼 또는 위치 1번으로 매수/매도/STOP 분류
  if (D.orders?.length) {
    const orderType = o => fcol(o, 1, '주문','구분','type');
    const buys  = D.orders.filter(o => /매수/.test(orderType(o)));
    const sells = D.orders.filter(o => /매도/.test(orderType(o)));
    const stops = D.orders.filter(o => /stop/i.test(orderType(o)));
    h += `<div class="sl">📋 주문 ${D.orders.length}건</div>`;
    if (buys.length)  h += `<div class="og buy"><span class="ms">trending_up</span>매수 ${buys.length}건</div>`  + buys.map(o=>ocCard(o,'buy')).join('');
    if (sells.length) h += `<div class="og sell" style="margin-top:6px"><span class="ms">trending_down</span>매도 ${sells.length}건</div>` + sells.map(o=>ocCard(o,'sell')).join('');
    if (stops.length) h += `<div class="og stop" style="margin-top:6px"><span class="ms">block</span>STOP ${stops.length}건</div>` + stops.map(o=>ocCard(o,'stop')).join('');
  }

  // 행동재무 경고
  if (D.bfinWarn) h += `<div class="bwarn"><div class="bwarn-lbl">⚠ 행동재무 경고</div><div class="bwarn-txt">${D.bfinWarn}</div></div>`;

  document.getElementById('p0').innerHTML = h || emptyHtml('checklist','오늘 할 일 없음','업데이트 버튼을 눌러 브리핑을 입력하세요');
}

function evtCard(e, cls, tag) {
  const time  = fcol(e, 1, '일시 (KST)','일시','시간','time');
  const event = fcol(e, 2, '이벤트','내용','event');
  return `<div class="evt ${cls}"><span class="evt-tag">${tag}</span><div><div class="evt-time">${time}</div><div class="evt-name">${event}</div></div></div>`;
}

function ocCard(o, cls) {
  const ic = {buy:'trending_up', sell:'trending_down', stop:'block'};
  const ticker = fcol(o, 0, '종목');
  const intent = fcol(o, 1, '의도','주문','구분');
  const price  = fcol(o, 2, '가격','price');
  const qty    = fcol(o, 3, '수량','qty');
  return `<div class="oc ${cls}"><span class="ms">${ic[cls]}</span>
    <div class="oc-mid"><div class="oc-ticker">${ticker}</div><div class="oc-intent">${intent}</div></div>
    <div><div class="oc-price">${price}</div><div class="oc-qty">${qty}</div></div>
  </div>`;
}

/* ── P1: 현황 ── */
function rP1() {
  let h = '';

  if (D.holdings?.length) {
    h += `<div class="sl">보유 종목</div><div class="hgrid">`;
    D.holdings.forEach(hd => {
      const ticker = fcol(hd, 0, '종목');
      const qty    = fcol(hd, 1, '보유','수량');
      const avg    = fcol(hd, 2, '평단','평균','평균단가');
      const price  = fcol(hd, 3, '현재가','가격');
      const pnl    = fcol(hd, 4, '평가손익(USD)','평가손익','손익');
      const ret    = fcol(hd, 5, '수익률','수익');
      const retN   = parseFloat(ret);
      const cls    = retN>0?'pos':retN<0?'neg':'neu';
      const pnlC   = pnl.startsWith('+')?'var(--buy)':pnl.startsWith('-')?'var(--stop)':'var(--sub)';
      // 직전 대비 변화
      const chg    = (D.changes||[]).find(c => fcol(c,0,'항목').includes(ticker));
      const chgVal = chg ? fcol(chg, 3, '변화') : '';
      const isUp   = chgVal.startsWith('+');
      h += `<div class="hcard ${cls}">
        <div class="hc-top"><span class="hc-ticker">${ticker}</span><span class="hc-ret">${ret}</span></div>
        <div class="hc-price">${price}</div>
        <div class="hc-row">
          <span class="hc-pnl" style="color:${pnlC}">${pnl}</span>
          ${chgVal ? `<span class="hc-chg ${isUp?'up':'dn'}">${chgVal}</span>` : ''}
        </div>
        <div class="hc-qty">${qty}주 · 평단 ${avg}</div>
      </div>`;
    });
    h += `</div>`;
  }

  if (D.changes?.length) {
    h += `<div class="sl" style="margin-top:16px">직전 대비</div><div class="dtable">`;
    D.changes.forEach(c => {
      const item  = fcol(c, 0, '항목','종목');
      const prev  = fcol(c, 1, '직전','이전');
      const curr  = fcol(c, 2, '현재','현재가');
      const delta = fcol(c, 3, '변화','차이');
      const cls   = delta.startsWith('+')?'up':delta.startsWith('-')?'dn':'';
      h += `<div class="drow">
        <div class="d-tick">${item}</div>
        <div class="d-px">${prev} → ${curr}</div>
        ${delta ? `<span class="d-delta ${cls}">${delta}</span>` : ''}
      </div>`;
    });
    h += `</div>`;
  }

  const usd    = fcol(D.account, 5, 'USD 현금','USD현금','usd');
  const fxpnl  = fcol(D.account, 4, '환차손익','환차');
  if (usd) {
    const usdMain = usd.split('(')[0].trim();
    const usdSub  = usd.match(/\(([^)]+)\)/)?.[1]||'';
    h += `<div class="usd-card">
      <div><div class="usd-lbl">USD CASH</div><div class="usd-val">${usdMain}</div><div class="usd-krw">${usdSub}</div></div>
      <div class="usd-r">환차손익<br>${fxpnl||'—'}</div>
    </div>`;
  }

  document.getElementById('p1').innerHTML = h || emptyHtml('bar_chart','현황 없음','업데이트 버튼을 눌러 브리핑을 입력하세요');
}

/* ── P2: 계기반 ── */
function rP2() {
  let h = '';

  // 계좌 KPI — account kv에서 위치 or 이름으로
  const kpiMap = [
    {l:'총 평가액',  keys:['총평가'],               pos:0},
    {l:'누적 수익률', keys:['수익률 (누적)','수익률'], pos:1},
    {l:'매매 손익',  keys:['매매손익','매매'],        pos:3},
    {l:'환차 손익',  keys:['환차손익','환차'],        pos:4},
  ];
  h += `<div class="sl">계좌 현황</div><div class="kgrid">`;
  kpiMap.forEach(({l, keys, pos}) => {
    const v = fcol(D.account, pos, ...keys) || '—';
    const col = v.startsWith('+')?'var(--buy)':v.startsWith('-')?'var(--stop)':'var(--text)';
    h += `<div class="kcard"><div class="k-lbl">${l}</div><div class="k-val" style="color:${col}">${v.split('(')[0].trim()}</div></div>`;
  });
  h += `</div>`;

  // 기술지표 (C섹션 첫 번째 테이블)
  if (D.technicals?.length) {
    h += `<div class="sl" style="margin-top:16px">기술 지표 · RSI</div>`;
    D.technicals.forEach(t => {
      const ticker = fcol(t, 0, '종목');
      if (!ticker || ticker === '종목' || ticker === 'USD현금' || ticker === 'ETH별도') return;
      const rN = rsiN(fcol(t, 3, 'RSI') || '50');
      const rC = rsiC(rN);
      const R = 17, C2 = 2*Math.PI*R, fill = C2*(rN/100);
      const macd  = fcol(t, 4, 'MACD');
      const ma50  = fcol(t, 5, '50일선');
      const weight = fcol(t, 1, '비중%','비중');
      h += `<div class="trow">
        <div class="t-tick">${ticker}</div>
        <div class="t-rsi">
          <svg width="46" height="46" viewBox="0 0 46 46">
            <circle cx="23" cy="23" r="${R}" fill="none" stroke="#e2e8f0" stroke-width="5"/>
            <circle cx="23" cy="23" r="${R}" fill="none" stroke="${rC}" stroke-width="5"
              stroke-dasharray="${fill.toFixed(1)} ${C2.toFixed(1)}"
              stroke-linecap="round" transform="rotate(-90 23 23)"/>
          </svg>
          <div class="t-rsi-v" style="color:${rC}">${rN}</div>
        </div>
        <div class="t-info">
          <div class="t-macd">MACD <span style="color:var(--sub)">${macd}</span></div>
          <div class="t-50">50일선 ${ma50} · 비중 ${weight}</div>
          ${rN>=75 ? `<div class="t-warn">⚠ 과매수 구간</div>` : ''}
        </div>
      </div>`;
    });
  }

  // 매크로 pills
  if (D.macro?.length) {
    h += `<div class="sl" style="margin-top:16px">매크로</div><div class="pills">`;
    D.macro.forEach(m => {
      const w = /경고|↑|⚠|쇼크|위험|급등|급락/.test(m);
      h += `<div class="pill${w?' w':''}">${m}</div>`;
    });
    h += `</div>`;
  }

  document.getElementById('p2').innerHTML = h || emptyHtml('speed','계기반 없음','업데이트 버튼을 눌러 브리핑을 입력하세요');
}

/* ── P3: 항로 ── */
function rP3() {
  let h = '';

  // D-Day
  if (D.ddays?.length) {
    h += `<div class="sl">항로 · D-Day</div>`;
    D.ddays.forEach(e => {
      const dd    = fcol(e, 0, 'D-Day','D','d-day');
      const event = fcol(e, 2, '이벤트','내용') || fp(e, 1);
      const time  = fcol(e, 1, '일시 (KST)','일시','시간') || fp(e, 2);
      const cls   = /D-0/.test(dd)?'today':/D-[12](?!\d)/.test(dd)?'near':/D-7/.test(dd)?'big':'';
      h += `<div class="ddrow">
        <div class="dd-badge ${cls}">${dd}</div>
        <div style="flex:1"><div class="dd-event">${event}</div><div class="dd-time">${time}</div></div>
        ${cls==='today' ? `<span class="ms" style="color:var(--stop);font-size:20px">priority_high</span>` : ''}
      </div>`;
    });
  }

  // 리스크 시나리오
  if (D.risks?.length) {
    h += `<div class="sl" style="margin-top:16px">리스크 시나리오</div>`;
    D.risks.forEach((r, i) => {
      const cls  = i>=D.risks.length-2?'high':i>=2?'mid':'low';
      const scen = fcol(r, 0, '시나리오','상황','scenario');
      const trig = fcol(r, 1, '트리거','조건','trigger');
      const act  = fcol(r, 2, '대응','액션','action');
      h += `<div class="rcard ${cls}">
        <div class="r-scen">${scen}</div>
        ${trig ? `<div class="r-trig">트리거: ${trig}</div>` : ''}
        ${act  ? `<div class="r-act">${act}</div>` : ''}
      </div>`;
    });
  }

  // 후보 종목 (L) — 컬럼 구조 자동 감지
  if (D.candidates?.length) {
    h += `<div class="sl" style="margin-top:16px">종목 교체 후보</div>`;
    const hasHubo = D.candidates.some(c => fg(c,'후보'));
    if (hasHubo) {
      // 기존: 후보|진입가|진입시점|근거 형태
      D.candidates.filter(c => fcol(c,0,'후보') && fcol(c,0,'후보')!=='후보').forEach(c => {
        const t  = fcol(c, 0, '후보');
        const ep = fcol(c, 2, '진입가');
        const et = fcol(c, 1, '진입 시점','진입시점');
        const rs = fcol(c, 6, '근거','이유');
        h += `<div class="ccard">
          <div class="c-top"><span class="c-ticker">${t}</span>${ep?`<span class="c-entry">${ep}</span>`:''}</div>
          ${et ? `<div style="font-size:10px;color:var(--sub);margin-top:2px">${et}</div>` : ''}
          ${rs ? `<div class="c-reason">${rs}</div>` : ''}
        </div>`;
      });
    } else {
      // 제너릭: 상황|액션 또는 임의 2컬럼 테이블
      D.candidates.filter(c => fp(c,0) && fp(c,0) !== fp(D.candidates[0],0)).forEach(c => {
        const title  = fp(c, 0);
        const detail = fp(c, 1);
        if (!title) return;
        h += `<div class="ccard">
          <div class="c-top"><span class="c-ticker" style="font-size:12px">${title}</span></div>
          ${detail ? `<div class="c-reason">${detail}</div>` : ''}
        </div>`;
      });
    }
  }

  // 양도세
  const pN  = parseFloat(String(D.taxPaid||'0').replace(/[,원+]/g,''));
  const pct = Math.min(100, Math.round(pN/2500000*100));
  h += `<div class="sl" style="margin-top:16px">양도세 트래커</div>
    <div class="taxcard">
      <div class="tax-hd"><span class="tax-lbl">누적 매매익</span><span class="tax-pct">${pct}% / 250만원</span></div>
      <div class="tax-bg"><div class="tax-fill" id="taxFill"></div></div>
      <div class="tax-sub">${D.taxPaid} · 22% 세율 · 12월 손익통산</div>
    </div>`;

  // 섹터 동조
  if (D.sectors?.length) {
    h += `<div class="sl" style="margin-top:16px">섹터 동조</div>`;
    D.sectors.forEach(s => { h += `<div class="card">${s}</div>`; });
  }

  document.getElementById('p3').innerHTML = h;
  setTimeout(() => { const f=document.getElementById('taxFill'); if(f) f.style.width=pct+'%'; }, 50);
}

/* ════════════════════════════
   UI
════════════════════════════ */
function setTab(i) {
  curTab = i;
  document.querySelectorAll('.pane').forEach((el,j) => el.classList.toggle('on', i===j));
  document.querySelectorAll('.tab').forEach((el,j)  => el.classList.toggle('on', i===j));
  document.getElementById('content').scrollTop = 0;
}
function openInput()   { document.getElementById('ovInput').classList.add('on'); }
function closeInput()  { document.getElementById('ovInput').classList.remove('on'); }

function rsiN(s) { return parseInt((String(s).match(/(\d+)/)||[,'50'])[1]); }
function rsiC(v) { return v>=75?'#dc2626':v>=60?'#d97706':v>=45?'#16a34a':'#2563eb'; }

function emptyHtml(icon, t, s) {
  return `<div class="empty"><span class="ms">${icon}</span><div class="empty-t">${t}</div><div class="empty-s">${s}</div></div>`;
}

let _tt = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('on'), 2500);
}
</script>
