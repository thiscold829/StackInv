<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 패드</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f0;
    --white: #ffffff;
    --border: #e0e0d8;
    --border2: #d0d0c8;
    --text: #1a1a1a;
    --text-mid: #555550;
    --text-dim: #999990;
    --accent: #1a6ef5;
    --accent-bg: #eef3ff;
    --danger: #e53e3e;
    --success: #2d8a5e;
    --yellow: #e8a020;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 20px 16px 48px;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--border);
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    letter-spacing: 1.5px;
  }
  .logo span { color: var(--accent); }
  .claude-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .claude-btn:hover { background: #1558d0; }
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-left-width: 4px;
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card.flash { box-shadow: 0 0 0 2px var(--success); }
  .card-row {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    gap: 10px;
  }
  .card-title {
    flex: 1;
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
  }
  .card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .add-btn {
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid #c5d8ff;
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
  }
  .add-btn:hover { background: #dde9ff; }
  .toggle-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.12s, color 0.12s;
  }
  .toggle-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }
  .card-content {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .card-content.open { display: block; }
  .card-content pre {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-mid);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.7;
    padding-top: 12px;
    max-height: 260px;
    overflow-y: auto;
  }
  .composer {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .composer-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 8px;
    flex-wrap: wrap;
  }
  .composer-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .char-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .btn-group { display: flex; gap: 7px; }
  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 7px;
    border: 1.5px solid;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .btn-copy { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-copy:hover { background: #1558d0; border-color: #1558d0; }
  .btn-clear { background: transparent; border-color: var(--border2); color: var(--text-mid); }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }
  .composer-textarea {
    width: 100%;
    min-height: 180px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    padding: 14px;
    resize: none;
    outline: none;
    overflow: hidden;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #1a1a1a;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.18s, transform 0.18s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { background: var(--success); }
  .toast.warn { background: var(--yellow); color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>P</span>ROMPT PAD</div>
  <a class="claude-btn"
     href="https://claude.ai/chat/a65b65a8-6f10-4e1d-b52a-7a5ca9d1896e"
     target="_blank">↗ Claude 열기</a>
</div>

<div class="section-label">프롬프트 카드</div>
<div class="cards-grid" id="cardsGrid"></div>

<div class="section-label">조합 패드</div>
<div class="composer">
  <div class="composer-toolbar">
    <div class="composer-left">
      <span class="section-label" style="margin:0">COMPOSE</span>
      <span class="char-count" id="charCount">0자</span>
    </div>
    <div class="btn-group">
      <button class="btn btn-copy" onclick="copyAll()">전체 복사</button>
      <button class="btn btn-clear" onclick="clearAll()">전체 삭제</button>
    </div>
  </div>
  <textarea
    class="composer-textarea"
    id="composer"
    placeholder="카드의 [+ 추가] 버튼을 누르면 여기에 쌓입니다. 직접 편집도 가능해요."
    oninput="onInput(this)"
  ></textarea>
</div>

<div class="toast" id="toast"></div>

const PROMPTS = [

  // ─── 카드 2 ───────────────────────────────────────────────

시작하라.`

// ============================================================
// 아래는 건드리지 마세요
// ============================================================

const grid = document.getElementById('cardsGrid');
const composer = document.getElementById('composer');
const charCount = document.getElementById('charCount');
const toast = document.getElementById('toast');

PROMPTS.forEach((p) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.borderLeftColor = p.accent || '#ccc';

  card.innerHTML = `
    <div class="card-row">
      <div class="card-title">${p.title}</div>
      <div class="card-actions">
        <button class="toggle-btn">내용 보기</button>
        <button class="add-btn">+ 추가</button>
      </div>
    </div>
    <div class="card-content">
      <pre>${escHtml(p.content)}</pre>
    </div>
  `;

  const toggleBtn = card.querySelector('.toggle-btn');
  const contentEl = card.querySelector('.card-content');
  const addBtn = card.querySelector('.add-btn');

  toggleBtn.addEventListener('click', () => {
    const open = contentEl.classList.toggle('open');
    toggleBtn.textContent = open ? '내용 닫기' : '내용 보기';
  });

  addBtn.addEventListener('click', () => {
    const sep = composer.value.trim() ? '\n\n' + '─'.repeat(44) + '\n\n' : '';
    composer.value += sep + p.content;
    autoResize(composer);
    updateCount();
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 900);
    showToast('패드에 추가됐습니다', 'ok');
  });

  grid.appendChild(card);
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(180, el.scrollHeight) + 'px';
}
function onInput(el) { autoResize(el); updateCount(); }
function updateCount() {
  charCount.textContent = composer.value.length.toLocaleString() + '자';
}
function copyAll() {
  if (!composer.value.trim()) { showToast('패드가 비어 있습니다', 'warn'); return; }
  navigator.clipboard.writeText(composer.value).then(() => {
    showToast('복사 완료 — Claude 창에 붙여넣기 하세요');
  });
}
function clearAll() {
  composer.value = '';
  composer.style.height = '180px';
  updateCount();
  showToast('패드를 지웠습니다');
}
let toastTimer;
function showToast(msg, type = '') {
  toast.textContent = msg;
  toast.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2200);
}
</script>
